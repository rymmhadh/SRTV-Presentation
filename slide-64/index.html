<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide : Taxi — notifications & reçu (n8n)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../nav-hint.css">
    <link rel="stylesheet" href="../theme.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="slide">
        <header class="slide__header">
            <div class="slide__badge">
                <span class="slide__badge-dot"></span>
                <span>Orchestration n8n &middot; Taxi</span>
            </div>
            <h1 class="slide__title">Taxi : notifications et reçu de course</h1>
            <p class="slide__subtitle">Trois workflows n8n complètent la course : notifier le chauffeur, notifier le passager, et envoyer le reçu par e-mail (cliquez une image pour l'agrandir)</p>
        </header>

        <div class="notif-grid">
            <figure class="notif-item">
                <div class="capture-frame"><img src="notif-chauffeur.png" alt="Workflow n8n notification chauffeur"></div>
                <figcaption>Notification chauffeur</figcaption>
            </figure>
            <figure class="notif-item">
                <div class="capture-frame"><img src="notif-passager.png" alt="Workflow n8n notification passager"></div>
                <figcaption>Notification passager</figcaption>
            </figure>
            <figure class="notif-item">
                <div class="capture-frame"><img src="recu.png" alt="Workflow n8n reçu de course par e-mail"></div>
                <figcaption>Reçu de course (e-mail SMTP)</figcaption>
            </figure>
        </div>

        <div class="navigation">
            <span class="nav-year">-- / --</span>
        </div>
    </div>

    <script src="../slide-enter.js"></script>
    <script src="script.js"></script>
    <script src="../nav.js"></script>
    <script src="../transition.js"></script>
</body>
</html>
