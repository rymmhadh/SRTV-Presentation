<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide : Architecture Livestream</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../nav-hint.css">
    <link rel="stylesheet" href="../theme.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="slide">

        <header class="slide__header">
            <div class="slide__badge">
                <span class="slide__badge-dot"></span>
                <span>Deep dive technique</span>
            </div>
            <h1 class="slide__title">L'architecture du livestream</h1>
            <p class="slide__subtitle">Un pipeline HLS intégré au livestream-service, sans serveur média ni logiciel d'ingestion séparé</p>
        </header>

        <div class="diagram-panel">
            <svg viewBox="0 0 1000 470" class="flow-svg" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pipeline HLS du livestream : upload, transcodage FFmpeg, segmentation, manifeste, qualité adaptative">
                <defs>
                    <marker id="arr4" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
                    </marker>
                </defs>

                <!-- Top pipeline : 5 steps -->
                <g class="node">
                    <rect x="15" y="60" width="165" height="88" rx="10" class="box"/>
                    <text x="97" y="98" class="t-title2">Upload</text>
                    <text x="97" y="121" class="t-sub">vidéo (MP4)</text>
                </g>
                <g class="node">
                    <rect x="210" y="60" width="165" height="88" rx="10" class="box box--ai"/>
                    <text x="292" y="98" class="t-title2">Transcodage</text>
                    <text x="292" y="121" class="t-sub t-sub--ai">FFmpeg</text>
                </g>
                <g class="node">
                    <rect x="405" y="60" width="165" height="88" rx="10" class="box"/>
                    <text x="487" y="98" class="t-title2">Segmentation</text>
                    <text x="487" y="121" class="t-sub">.ts (2–10 s)</text>
                </g>
                <g class="node">
                    <rect x="600" y="60" width="165" height="88" rx="10" class="box"/>
                    <text x="682" y="98" class="t-title2">Manifeste</text>
                    <text x="682" y="121" class="t-sub">.m3u8 (HLS)</text>
                </g>
                <g class="node">
                    <rect x="795" y="60" width="165" height="88" rx="10" class="box"/>
                    <text x="877" y="98" class="t-title2">Qualité</text>
                    <text x="877" y="121" class="t-sub">adaptative</text>
                </g>

                <!-- pipeline arrows -->
                <line x1="180" y1="104" x2="208" y2="104" class="edge" marker-end="url(#arr4)"/>
                <line x1="375" y1="104" x2="403" y2="104" class="edge" marker-end="url(#arr4)"/>
                <line x1="570" y1="104" x2="598" y2="104" class="edge" marker-end="url(#arr4)"/>
                <line x1="765" y1="104" x2="793" y2="104" class="edge" marker-end="url(#arr4)"/>

                <!-- section label -->
                <text x="342" y="300" class="t-section">Pourquoi FFmpeg intégré au microservice</text>

                <!-- reason boxes -->
                <g class="node">
                    <rect x="55" y="330" width="185" height="88" rx="12" class="box box--dashed"/>
                    <text x="147" y="368" class="t-title2">Pas de serveur</text>
                    <text x="147" y="392" class="t-sub">média séparé</text>
                </g>
                <g class="node">
                    <rect x="250" y="330" width="185" height="88" rx="12" class="box box--dashed"/>
                    <text x="342" y="368" class="t-title2">Pas d'OBS</text>
                    <text x="342" y="392" class="t-sub">upload direct du fichier</text>
                </g>
                <g class="node">
                    <rect x="445" y="330" width="185" height="88" rx="12" class="box box--dashed"/>
                    <text x="537" y="362" class="t-title2">Empreinte faible</text>
                    <text x="537" y="386" class="t-sub">transcodage à la</text>
                    <text x="537" y="402" class="t-sub">demande</text>
                </g>

                <!-- reason arrows converge to Transcodage bottom -->
                <line x1="147" y1="330" x2="275" y2="150" class="edge" marker-end="url(#arr4)"/>
                <line x1="342" y1="330" x2="292" y2="150" class="edge" marker-end="url(#arr4)"/>
                <line x1="537" y1="330" x2="309" y2="150" class="edge" marker-end="url(#arr4)"/>
            </svg>
        </div>

        <div class="navigation">
            <span class="nav-year">-- / --</span>
        </div>

    </div>

    <script src="../slide-enter.js"></script>
    <script src="script.js"></script>
    <script src="../nav.js"></script>
    <script src="../transition.js"></script>
</body>
</html>
