<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide : Architecture de Lina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../nav-hint.css">
    <link rel="stylesheet" href="../theme.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="slide">

        <header class="slide__header">
            <div class="slide__badge">
                <span class="slide__badge-dot"></span>
                <span>Architecture technique</span>
            </div>
            <h1 class="slide__title">L'architecture de Lina</h1>
            <p class="slide__subtitle">Un pipeline vocal de bout en bout, orchestré par Claude Haiku : de la parole de l'utilisateur à une réponse parlée</p>
        </header>

        <div class="diagram-panel">
            <svg viewBox="0 0 1000 470" class="flow-svg" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pipeline de Lina : ASR, NLU/Plan, Outils, Composition, TTS avec sources">
                <defs>
                    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
                        <path d="M0,0 L7,3 L0,6 Z" fill="#334155"/>
                    </marker>
                </defs>

                <!-- Top pipeline -->
                <!-- 1 ASR -->
                <g class="node">
                    <rect x="15" y="60" width="165" height="88" rx="10" class="box"/>
                    <text x="97" y="95" class="t-title">ASR</text>
                    <text x="97" y="118" class="t-sub">Deepgram</text>
                    <text x="97" y="134" class="t-sub">Nova-3</text>
                </g>
                <!-- 2 NLU/Plan (Claude) -->
                <g class="node">
                    <rect x="210" y="60" width="165" height="88" rx="10" class="box box--ai"/>
                    <text x="292" y="95" class="t-title">NLU / Plan</text>
                    <text x="292" y="118" class="t-sub t-sub--ai">Claude Haiku</text>
                </g>
                <!-- 3 Outils -->
                <g class="node">
                    <rect x="405" y="60" width="165" height="88" rx="10" class="box"/>
                    <text x="487" y="95" class="t-title">Outils</text>
                    <text x="487" y="118" class="t-sub">exécution</text>
                </g>
                <!-- 4 Composition (Claude) -->
                <g class="node">
                    <rect x="600" y="60" width="165" height="88" rx="10" class="box box--ai"/>
                    <text x="682" y="95" class="t-title">Composition</text>
                    <text x="682" y="118" class="t-sub t-sub--ai">Claude Haiku</text>
                </g>
                <!-- 5 TTS -->
                <g class="node">
                    <rect x="795" y="60" width="165" height="88" rx="10" class="box"/>
                    <text x="877" y="95" class="t-title">TTS</text>
                    <text x="877" y="118" class="t-sub">ElevenLabs</text>
                </g>

                <!-- pipeline arrows -->
                <line x1="180" y1="104" x2="208" y2="104" class="edge" marker-end="url(#arr)"/>
                <line x1="375" y1="104" x2="403" y2="104" class="edge" marker-end="url(#arr)"/>
                <line x1="570" y1="104" x2="598" y2="104" class="edge" marker-end="url(#arr)"/>
                <line x1="765" y1="104" x2="793" y2="104" class="edge" marker-end="url(#arr)"/>

                <!-- Source boxes -->
                <g class="node">
                    <rect x="150" y="330" width="185" height="88" rx="12" class="box box--dashed"/>
                    <text x="242" y="365" class="t-title2">Services SRTV</text>
                    <text x="242" y="388" class="t-sub">tourism-service,</text>
                    <text x="242" y="404" class="t-sub">taxi-service</text>
                </g>
                <g class="node">
                    <rect x="407" y="330" width="185" height="88" rx="12" class="box box--dashed"/>
                    <text x="499" y="365" class="t-title2">Géolocalisation</text>
                    <text x="499" y="388" class="t-sub">HERE, OpenStreetMap,</text>
                    <text x="499" y="404" class="t-sub">météo</text>
                </g>
                <g class="node">
                    <rect x="664" y="330" width="185" height="88" rx="12" class="box box--dashed"/>
                    <text x="756" y="365" class="t-title2">Mémoire</text>
                    <text x="756" y="388" class="t-sub">préférences,</text>
                    <text x="756" y="404" class="t-sub">historique</text>
                </g>

                <!-- source arrows converge to Outils bottom -->
                <line x1="242" y1="330" x2="470" y2="150" class="edge" marker-end="url(#arr)"/>
                <line x1="499" y1="330" x2="490" y2="150" class="edge" marker-end="url(#arr)"/>
                <line x1="756" y1="330" x2="510" y2="150" class="edge" marker-end="url(#arr)"/>
            </svg>
        </div>

        <div class="navigation">
            <span class="nav-year">-- / --</span>
        </div>

    </div>

    <script src="../slide-enter.js"></script>
    <script src="script.js"></script>
    <script src="../nav.js"></script>
    <script src="../transition.js"></script>
</body>
</html>
