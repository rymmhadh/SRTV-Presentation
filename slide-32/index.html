<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 18 : Merci</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../nav-hint.css">
    <link rel="stylesheet" href="../theme.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="slide">
        <div class="merci-content">
            <div class="merci-badge" data-delay="0">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </div>
            <h1 class="merci-title" data-delay="1">Merci pour votre attention</h1>
            <p class="merci-subtitle" data-delay="2">Questions &amp; R&eacute;ponses</p>

            <div class="merci-divider" data-delay="3"></div>

            <div class="merci-info" data-delay="4">
                <div class="merci-info__item">
                    <span class="merci-info__label">Projet</span>
                    <span class="merci-info__value">SRTV  :  Smart Regional Television</span>
                </div>
                <div class="merci-info__item">
                    <span class="merci-info__label">Site Web</span>
                    <span class="merci-info__value">https://srtv.glybette.com</span>
                </div>
                <div class="merci-info__item">
                    <span class="merci-info__label">Application</span>
                    <span class="merci-info__value">App Store &amp; Play Store (soon)</span>
                </div>
            </div>

            <a class="merci-qr" href="https://srtv.glybette.com" target="_blank" rel="noopener" data-delay="5">
                <img class="merci-qr__img" src="qr-plateforme.png" alt="QR code vers la plateforme SRTV">
                <span class="merci-qr__caption">Scannez pour accéder à la plateforme</span>
            </a>
        </div>

        <div class="navigation">
            <span class="nav-year">32 / 34</span>
        </div>
    </div>

    <script src="../slide-enter.js"></script>
    <script src="script.js"></script>
    <script src="../nav.js"></script>
    <script src="../transition.js"></script>
</body>
</html>
