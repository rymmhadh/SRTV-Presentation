    <g><rect x="270" y="24" width="168" height="42" rx="9" fill="#0077CC"/><text x="354" y="50" fill="#fff">Application chauffeur</text></g>
    <g><rect x="546" y="24" width="144" height="42" rx="9" fill="#1d4ed8"/><text x="618" y="50" fill="#fff">Passerelle API</text></g>
    <g><rect x="810" y="24" width="144" height="42" rx="9" fill="#0077CC"/><text x="882" y="50" fill="#fff">Service Taxi</text></g>
    <g><rect x="1086" y="24" width="120" height="42" rx="9" fill="#0077CC"/><text x="1146" y="50" fill="#fff">Carte</text></g>
    <g><rect x="1354" y="24" width="112" height="42" rx="9" fill="#0077CC"/><text x="1410" y="50" fill="#fff">Kafka</text></g>
