<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 16 : Interface Reels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../nav-hint.css">
    <link rel="stylesheet" href="../theme.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="slide">
        <header class="slide__header">
            <h1 class="slide__title">Interface Reels</h1>
            <p class="slide__subtitle">Exp&eacute;rience Web et Mobile pour les vid&eacute;os courtes Reels</p>
        </header>

        <div class="interface-stage">
            <div class="device device--web" data-delay="1">
                <div class="device__frame">
                    <div class="browser-chrome">
                        <div class="browser-dots">
                            <span></span><span></span><span></span>
                        </div>
                        <div class="browser-url">srtv.glybette.com/reels</div>
                    </div>
                    <div class="device__screen">
                        <img src="../Interface/Reels/webreels.png" alt="Interface Web Reels SRTV">
                    </div>
                </div>
                <span class="device__label">Application Web</span>
            </div>

            <div class="device device--mobile" data-delay="2">
                <div class="device__frame">
                    <div class="device__notch"></div>
                    <div class="device__screen">
                        <img src="../Interface/Reels/reelsMobile.jpeg" alt="Interface Mobile Reels SRTV">
                    </div>
                </div>
                <span class="device__label">Application Mobile</span>
            </div>
        </div>

        <div class="navigation">
            <span class="nav-year">25 / 34</span>
        </div>
    </div>

    <!-- Full-page Image Gallery -->
    <div class="gallery" id="gallery">
        <div class="gallery__backdrop"></div>
        <div class="gallery__stage">
            <img class="gallery__img" src="../Interface/Reels/webreels.png" alt="Interface Web Reels SRTV">
            <img class="gallery__img" src="../Interface/Reels/reelsMobile.jpeg" alt="Interface Mobile Reels SRTV">
        </div>

        <div class="gallery__controls">
            <button class="gallery__arrow gallery__arrow--left" id="gallery-prev" aria-label="Image précédente">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <div class="gallery__meta">
                <span class="gallery__counter" id="gallery-counter">1 / 2</span>
                <div class="gallery__progress"><div class="gallery__progress-fill" id="gallery-progress"></div></div>
            </div>
            <button class="gallery__arrow gallery__arrow--right" id="gallery-next" aria-label="Image suivante">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
        </div>

        <button class="gallery__close" id="gallery-close" aria-label="Fermer la galerie">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>

    <script src="../slide-enter.js"></script>
    <script src="script.js"></script>
    <script src="../nav.js"></script>
    <script src="../transition.js"></script>
</body>
</html>
