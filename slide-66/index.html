<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide : Démonstration du dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../nav-hint.css">
    <link rel="stylesheet" href="../theme.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>

    <div class="slide">

        <header class="slide__header">
            <div class="slide__badge">
                <span class="slide__badge-dot"></span>
                <span>Démonstration vidéo</span>
            </div>
            <h1 class="slide__title">Démonstration du dashboard</h1>
            <p class="slide__subtitle">Pilotage et supervision de la plateforme depuis le tableau de bord</p>
        </header>

        <div class="video-frame">
            <video controls playsinline preload="metadata">
                <source src="demodash.mp4" type="video/mp4">
                Votre navigateur ne peut pas lire cette vidéo.
            </video>
        </div>

        <div class="navigation">
            <span class="nav-year">-- / --</span>
        </div>

    </div>

    <script src="../slide-enter.js"></script>
    <script src="script.js"></script>
    <script src="../nav.js"></script>
    <script src="../transition.js"></script>
</body>
</html>
